name: onion_notes
description: "ONION — стильные офлайн заметки"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  path_provider: ^2.1.3
  uuid: ^4.4.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/app_icon.png
    - assets/images/mascot_sitting.png
    - assets/images/mascot_reading.png
    - assets/images/mascot_coffee.png

  # Шрифты ниже — реальные .ttf файлы, они лежат в assets/fonts/ и уже
  # включены в проект (взяты из открытого репозитория Google Fonts, лицензия
  # OFL). Хотите добавить ещё — смотрите scripts/download_fonts.sh: там есть
  # готовые команды на дополнительные шрифты (Inter, JetBrains Mono, Nunito,
  # Merriweather, Pacifico, Manrope...) и инструкция, какой блок дописать
  # сюда после скачивания.
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
    - family: Comfortaa
      fonts:
        - asset: assets/fonts/Comfortaa-Regular.ttf
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Regular.ttf
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
    - family: Caveat
      fonts:
        - asset: assets/fonts/Caveat-Regular.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
    # Скачаете их через scripts/download_fonts.sh — раскомментируйте:
    # - family: Inter
    #   fonts:
    #     - asset: assets/fonts/Inter-Regular.ttf
    #     - asset: assets/fonts/Inter-Italic.ttf
    #       style: italic
    # - family: JetBrainsMono
    #   fonts:
    #     - asset: assets/fonts/JetBrainsMono-Regular.ttf
    # - family: Nunito
    #   fonts:
    #     - asset: assets/fonts/Nunito-Regular.ttf
    # - family: Merriweather
    #   fonts:
    #     - asset: assets/fonts/Merriweather-Regular.ttf
    # - family: Pacifico
    #   fonts:
    #     - asset: assets/fonts/Pacifico-Regular.ttf
    # - family: Manrope
    #   fonts:
    #     - asset: assets/fonts/Manrope-Regular.ttf
